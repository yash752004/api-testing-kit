services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api_testing_kit}
      POSTGRES_USER: ${POSTGRES_USER:-api_testing_kit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_testing_kit_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-api_testing_kit} -d ${POSTGRES_DB:-api_testing_kit}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://api_testing_kit:api_testing_kit_dev@db:5432/api_testing_kit?sslmode=disable}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-4173}:4173"

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    profiles:
      - migrations
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://api_testing_kit:api_testing_kit_dev@db:5432/api_testing_kit?sslmode=disable}
    command:
      - goose
      - -dir
      - /workspace/server/migrations
      - postgres
      - ${DATABASE_URL:-postgres://api_testing_kit:api_testing_kit_dev@db:5432/api_testing_kit?sslmode=disable}
      - up
    volumes:
      - ./server/migrations:/workspace/server/migrations:ro

volumes:
  postgres-data:
